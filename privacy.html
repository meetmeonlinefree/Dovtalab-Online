                    content: `<p>Мо метавонем ин сиёсати махфиятро барои равшанӣ ё талаботи ҳуқуқӣ такмил диҳем. Ҳама тағйирот дар барнома ва дар ин саҳифа ҷойгир карда мешаванд. Санаи эътибор аз нав дида мешавад. Ташвиқ мекунем, ки ин саҳифаро давра ба давра баррасӣ кунед. Идомаи истифодаи барнома маънои қабули сиёсати навро дорад, аммо боварӣ дошта бошед, ки мо <strong>ҳеҷ гоҳ</strong> ҷамъоварии маълумотро бе огоҳии назаррас ва ризоият ҷорӣ намекунем.</p>`
                },
                {
                    title: "Маълумоти тамос",
                    content: `<p>Агар шумо дар бораи сиёсати махфияти мо савол дошта бошед (гарчанде ки мо ҳеҷ чиз ҷамъ намекунем), бо мо тамос гиред:</p>
                    <p>📧 Email: <strong>privacy@dovtalabonline.com</strong><br>
                    🌐 Сомона: саҳифаи дастгирии Довталаб Онлайн<br>
                    📬 Суроға: Душанбе / Маскав (лоиҳаи таълимӣ)</p>
                    <p>Мо ба махфияти шумо содиқем ва ҳарчи зудтар ҷавоб хоҳем дод.</p>`
                }
            ]
        }
    };

    let currentLanguage = 'en'; // default

    function renderPolicy(lang) {
        const data = translations[lang];
        if (!data) return;
        const sectionsData = data.sections;
        const contentDiv = document.getElementById('policyContent');
        if (!contentDiv) return;

        let html = '';
        sectionsData.forEach((section, idx) => {
            html += `
                <div class="policy-card fade-in" style="animation-delay: ${idx * 0.02}s">
                    <h2>${section.title}</h2>
                    ${section.content}
                </div>
            `;
        });
        contentDiv.innerHTML = html;

        // update active button style
        document.querySelectorAll('.lang-btn').forEach(btn => {
            const langVal = btn.getAttribute('data-lang');
            if (langVal === lang) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        // update header badge text (optional, small flourish)
        const badgeSpan = document.getElementById('policyHeaderBadge');
        if(badgeSpan) {
            if(lang === 'en') badgeSpan.innerHTML = '🔒 Privacy Policy · Zero personal data';
            else if(lang === 'ru') badgeSpan.innerHTML = '🔒 Политика конфиденциальности · Никаких личных данных';
            else badgeSpan.innerHTML = '🔒 Сиёсати махфият · Ҳеҷ гуна маълумоти шахсӣ';
        }
    }

    function setLanguage(lang) {
        if (lang === currentLanguage) return;
        currentLanguage = lang;
        renderPolicy(lang);
        // save preference in localStorage for persistence (offline & revisit)
        try {
            localStorage.setItem('app_language_pref', lang);
        } catch(e) { /* ignore */ }
    }

    // attach event listeners to language buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const lang = btn.getAttribute('data-lang');
            setLanguage(lang);
        });
    });

    // load saved preference or default
    const savedLang = (() => {
        try {
            return localStorage.getItem('app_language_pref');
        } catch(e) { return null; }
    })();
    if (savedLang && (savedLang === 'en' || savedLang === 'ru' || savedLang === 'tg')) {
        currentLanguage = savedLang;
    } else {
        currentLanguage = 'en';
    }
    renderPolicy(currentLanguage);

    // optional: tiny animation on load
    document.querySelectorAll('.policy-card').forEach(card => {
        card.style.opacity = '1';
    });
</script>
</body>
</html>
